<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sruthi & Surya's E-Invite</title>
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional form styles for the RSVP section */
        .rsvp-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .rsvp-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .rsvp-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
            align-items: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 1.5rem;
        }

        .glass-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1rem;
            font-family: var(--font-body);
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        
        .glass-input::placeholder {
            color: rgba(44, 62, 80, 0.6);
        }
    </style>
</head>

<body>
    <div class="glass-container">
        <div class="invitation-content">
            <p class="subtitle">Sruthi & Surya's E-Invite</p>
            <h1 class="title">You're <span>Invited!</span></h1>

            <p class="detail-item" style="justify-content: center; text-align: center; font-size: 1.2rem;">
                Please join us to celebrate with Sruthi & Surya.
            </p>

            <div class="rsvp-section">
                <h2 class="rsvp-title">RSVP</h2>

                <form class="rsvp-form" action="https://formspree.io/f/mzblzqdb" method="POST">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="Your Full Name" class="glass-input" required>
                        <input type="email" name="email" placeholder="Your Email Address" class="glass-input" required>
                        <select name="attending" class="glass-input" required>
                            <option value="" disabled selected>Will you be joining us?</option>
                            <option value="Yes">Joyfully Accept</option>
                            <option value="No">Regretfully Decline</option>
                        </select>
                    </div>

                    <button type="submit" class="rsvp-btn">Submit RSVP</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Background dynamic elements -->
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
</body>

</html>
